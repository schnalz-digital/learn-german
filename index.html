<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch Lernen - Learn German</title>
  <link rel="icon" href="favicon.svg">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --success: #34c759;
      --error: #ff3b30;
      --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12);
      --radius: 20px;
      --radius-lg: 28px;
      --invert: 0;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --bg-secondary: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
      --invert: 1;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12);
      --invert: 0;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #000000;
        --bg-secondary: #1c1c1e;
        --text: #f5f5f7;
        --text-secondary: #98989d;
        --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
        --invert: 1;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      min-height: 100vh;
    }

    .header { text-align: center; margin-bottom: 48px; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #1d1d1f 0%, #3a3a3c 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle { 
      color: var(--text-secondary); 
      font-size: 1.125rem;
      font-weight: 400;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
      background: var(--bg-secondary);
      padding: 6px;
      border-radius: var(--radius);
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      background: transparent;
      border: none;
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab:hover { color: var(--text); }
    .tab.active { 
      background: var(--bg); 
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .tab svg { width: 20px; height: 20px; }

    .category-filter { margin-bottom: 32px; }

    .category-filter label {
      display: block;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; }

    .category-btn {
      padding: 10px 18px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 980px;
      color: var(--text);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-btn:hover { background: #e8e8ed; }
    .category-btn.active { 
      background: var(--text); 
      color: var(--bg);
    }

    [data-theme="dark"] .category-btn:hover,
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .category-btn:hover {
        background: #3a3a3c;
      }
    }

    .flashcards-container {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--card-shadow);
    }

    .flashcards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .flashcards-header h2 { 
      font-size: 1.25rem;
      font-weight: 600;
    }

    .flashcards-progress { text-align: right; }
    .flashcards-progress span { 
      font-size: 0.875rem; 
      color: var(--text-secondary);
      font-weight: 500;
    }

    .progress-bar {
      width: 120px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flashcard { 
      perspective: 1200px; 
      cursor: pointer; 
      margin-bottom: 32px;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 320px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

    .flashcard-front, .flashcard-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 32px;
    }

    .flashcard-back { transform: rotateY(180deg); }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .flashcard-front h3, .flashcard-back h3 {
      font-size: 3rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .article-badge {
      display: inline-block;
      padding: 6px 16px;
      background: var(--text);
      border-radius: 980px;
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--bg);
    }

    .flip-hint {
      position: absolute;
      bottom: 24px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .german-reminder { 
      font-size: 1.125rem; 
      color: var(--text-secondary); 
      margin-top: 16px;
    }

    .flashcards-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover:not(:disabled) { 
      background: #e8e8ed;
      transform: scale(1.05);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn svg { width: 24px; height: 24px; }

    .known-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 980px;
      color: var(--text);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .known-btn:hover { background: #e8e8ed; }
    .known-btn.active { 
      background: var(--success); 
      color: white;
    }
    .known-btn svg { width: 18px; height: 18px; }

    .flashcards-actions { 
      display: flex; 
      justify-content: center; 
      gap: 12px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-radius: 980px;
      color: var(--accent);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover { 
      background: var(--bg-secondary);
    }
    .action-btn svg { width: 16px; height: 16px; }

    .known-summary {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--bg-secondary);
      color: var(--success);
      font-size: 0.9375rem;
      font-weight: 500;
    }

    .quiz-container {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--card-shadow);
    }

    .quiz-header { margin-bottom: 36px; }

    .quiz-mode-selector { 
      display: flex; 
      gap: 8px; 
      margin-bottom: 24px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 12px;
    }

    .quiz-mode-selector button {
      flex: 1;
      padding: 10px 16px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quiz-mode-selector button:hover { color: var(--text); }
    .quiz-mode-selector button.active { 
      background: var(--bg); 
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .quiz-stats { 
      display: flex; 
      gap: 24px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9375rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat svg { width: 18px; height: 18px; }

    .quiz-question { text-align: center; margin-bottom: 36px; }

    .question-label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .question-word { 
      font-size: 3rem; 
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .article-hint { 
      color: var(--text-secondary); 
      font-size: 1.125rem;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .option {
      padding: 20px 24px;
      background: var(--bg-secondary);
      border: none;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option:hover:not(:disabled) { 
      background: #e8e8ed;
      transform: scale(1.02);
    }
    .option.selected { background: #e8e8ed; }
    .option.correct { background: var(--success); color: white; }
    .option.incorrect { background: var(--error); color: white; }
    .option:disabled { cursor: default; }

    .result-feedback {
      text-align: center;
      padding: 24px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .result-feedback.correct {
      background: rgba(52, 199, 89, 0.12);
      color: var(--success);
    }

    .result-feedback.incorrect {
      background: rgba(255, 59, 48, 0.12);
      color: var(--error);
    }

    .result-feedback strong { color: var(--success); }

    .next-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: var(--accent);
      border: none;
      border-radius: 980px;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .next-btn:hover { 
      background: var(--accent-hover);
      transform: scale(1.02);
    }

    .restart-btn-small {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-radius: 980px;
      color: var(--accent);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn-small:hover { background: var(--bg-secondary); }
    .restart-btn-small svg { width: 16px; height: 16px; }

    .quiz-complete { text-align: center; padding: 48px 20px; }

    .trophy-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #ffd60a 0%, #ff9500 100%);
      border-radius: 50%;
      margin-bottom: 32px;
    }

    .trophy-icon svg { width: 48px; height: 48px; color: white; }

    .quiz-complete h2 { 
      font-size: 2rem; 
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .final-score { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 8px; 
      margin-bottom: 24px; 
    }

    .score-number { 
      font-size: 4rem; 
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .score-percent { 
      font-size: 1.25rem; 
      color: var(--text-secondary);
    }
    .score-message { 
      font-size: 1.125rem; 
      color: var(--text-secondary); 
      margin-bottom: 36px;
    }

    .restart-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 32px;
      background: var(--accent);
      border: none;
      border-radius: 980px;
      color: white;
      font-size: 1.0625rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn:hover { 
      background: var(--accent-hover);
      transform: scale(1.02);
    }
    .restart-btn svg { width: 18px; height: 18px; }

    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .footer-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--bg-secondary);
      border-radius: 980px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .footer-toggle:hover {
      border-color: var(--text-secondary);
      color: var(--text);
    }

    .footer-toggle svg { width: 12px; height: 12px; }

    @media (max-width: 600px) {
      .app { padding: 40px 16px 60px; }
      .logo h1 { font-size: 1.75rem; }
      .flashcards-container, .quiz-container { padding: 28px; }
      .flashcard-inner { height: 260px; }
      .flashcard-front h3, .flashcard-back h3, .question-word { font-size: 2rem; }
      .quiz-options { grid-template-columns: 1fr; }
      .category-buttons { justify-content: center; }
      .tabs { flex-direction: column; gap: 4px; background: transparent; padding: 0; }
      .tab { background: var(--bg-secondary); }
      .tab.active { background: var(--text); color: var(--bg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

    const { useState, useEffect } = React;

    // Icons as SVG components

    const SunIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

      </svg>
    );

    const MoonIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
    );

    // Vocabulary data
    const vocabulary = [
      { german: "Hallo", english: "Hello", article: null },
      { german: "Tschüss", english: "Goodbye", article: null },
      { german: "Ja", english: "Yes", article: null },
      { german: "Nein", english: "No", article: null },
      { german: "Bitte", english: "Please", article: null },
      { german: "Danke", english: "Thank you", article: null },
      { german: "Entschuldigung", english: "Sorry / Excuse me", article: null },
      { german: "Wasser", english: "Water", article: "das" },
      { german: "Brot", english: "Bread", article: "das" },
      { german: "Milch", english: "Milk", article: "die" },
      { german: "Apfel", english: "Apple", article: "der" },
      { german: "Kaffee", english: "Coffee", article: "der" },
      { german: "Tee", english: "Tea", article: "der" },
      { german: "Haus", english: "House", article: "das" },
      { german: "Katze", english: "Cat", article: "die" },
      { german: "Hund", english: "Dog", article: "der" },
      { german: "Buch", english: "Book", article: "das" },
      { german: "Schule", english: "School", article: "die" },
      { german: "Freund", english: "Friend (male)", article: "der" },
      { german: "Freundin", english: "Friend (female)", article: "die" },
      { german: "Mann", english: "Man", article: "der" },
      { german: "Frau", english: "Woman", article: "die" },
      { german: "Kind", english: "Child", article: "das" },
      { german: "Auto", english: "Car", article: "das" },
      { german: "Tag", english: "Day", article: "der" },
      { german: "Nacht", english: "Night", article: "die" },
      { german: "Morgen", english: "Morning", article: "der" },
      { german: "Abend", english: "Evening", article: "der" },
      { german: "Ich bin", english: "I am", article: null },
      { german: "Du bist", english: "You are", article: null },
      { german: "Er ist", english: "He is", article: null },
      { german: "Sie ist", english: "She is", article: null },
      { german: "Wir sind", english: "We are", article: null },
      { german: "Sie sind", english: "They are", article: null },
      { german: "Groß", english: "Big / Tall", article: null },
      { german: "Klein", english: "Small / Little", article: null },
      { german: "Gut", english: "Good", article: null },
      { german: "Schlecht", english: "Bad", article: null },
      { german: "Neu", english: "New", article: null },
      { german: "Alt", english: "Old", article: null },
    ];

    const categories = [
      { id: "all", name: "All Words" },
      { id: "greetings", name: "Greetings", words: ["Hallo", "Tschüss"] },
      { id: "basics", name: "Basics", words: ["Ja", "Nein", "Bitte", "Danke", "Entschuldigung"] },
      { id: "food", name: "Food & Drinks", words: ["Wasser", "Brot", "Milch", "Apfel", "Kaffee", "Tee"] },
      { id: "nouns", name: "Nouns", words: ["Haus", "Katze", "Hund", "Buch", "Schule", "Freund", "Freundin", "Mann", "Frau", "Kind", "Auto", "Tag", "Nacht", "Morgen", "Abend"] },
    ];

    // Flashcards Component
    function Flashcards({ words }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [knownWords, setKnownWords] = useState(new Set());
      const [shuffledWords, setShuffledWords] = useState([]);

      useEffect(() => {
        setShuffledWords([...words]);
        setCurrentIndex(0);
        setIsFlipped(false);
      }, [words]);

      const shuffleWords = () => {
        const shuffled = [...shuffledWords].sort(() => Math.random() - 0.5);
        setShuffledWords(shuffled);
        setCurrentIndex(0);
        setIsFlipped(false);
      };

      const resetDeck = () => {
        setShuffledWords([...words]);
        setCurrentIndex(0);
        setIsFlipped(false);
        setKnownWords(new Set());
      };

      const nextCard = () => {
        if (currentIndex < shuffledWords.length - 1) {
          setCurrentIndex(currentIndex + 1);
          setIsFlipped(false);
        }
      };

      const prevCard = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          setIsFlipped(false);
        }
      };

      const toggleKnown = () => {
        const word = shuffledWords[currentIndex];
        const newKnown = new Set(knownWords);
        if (newKnown.has(word.german)) {
          newKnown.delete(word.german);
        } else {
          newKnown.add(word.german);
        }
        setKnownWords(newKnown);
      };

      const currentWord = shuffledWords[currentIndex];

      if (!currentWord) return null;

      return (
        <div className="flashcards-container">
          <div className="flashcards-header">
            <h2>Flashcards</h2>
            <div className="flashcards-progress">
              <span>{currentIndex + 1} / {shuffledWords.length}</span>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${((currentIndex + 1) / shuffledWords.length) * 100}%` }} />
              </div>
            </div>
          </div>

          <div className={`flashcard ${isFlipped ? 'flipped' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
            <div className="flashcard-inner">
              <div className="flashcard-front">
                <span className="card-label">German</span>
                {currentWord.article && <span className="article-badge">{currentWord.article}</span>}
                <h3>{currentWord.german}</h3>
                <p className="flip-hint">Click to flip</p>
              </div>
              <div className="flashcard-back">
                <span className="card-label">English</span>
                <h3>{currentWord.english}</h3>
                <p className="german-reminder">{currentWord.german}</p>
              </div>
            </div>
          </div>

          <div className="flashcards-controls">
            <button onClick={prevCard} disabled={currentIndex === 0} className="nav-btn"><ChevronLeftIcon /></button>
            <button onClick={toggleKnown} className={`known-btn ${knownWords.has(currentWord.german) ? 'active' : ''}`}>
              <CheckIcon /><span>{knownWords.has(currentWord.german) ? 'Known' : 'Mark Known'}</span>
            </button>
            <button onClick={nextCard} disabled={currentIndex === shuffledWords.length - 1} className="nav-btn"><ChevronRightIcon /></button>
          </div>

          <div className="flashcards-actions">
            <button onClick={shuffleWords} className="action-btn"><ShuffleIcon /><span>Shuffle</span></button>
            <button onClick={resetDeck} className="action-btn"><RotateCcwIcon /><span>Reset</span></button>
          </div>

          {knownWords.size > 0 && (
            <div className="known-summary"><span>{knownWords.size} of {shuffledWords.length} words known</span></div>
          )}
        </div>
      );
    }

    // Quiz Component
    function Quiz({ words }) {
      const [quizWords, setQuizWords] = useState([]);
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [isCorrect, setIsCorrect] = useState(false);
      const [quizComplete, setQuizComplete] = useState(false);
      const [mode, setMode] = useState('de-to-en');

      useEffect(() => { startNewQuiz(); }, [words, mode]);

      const startNewQuiz = () => {
        const shuffled = [...words].sort(() => Math.random() - 0.5).slice(0, 10);
        setQuizWords(shuffled);
        setCurrentQuestion(0);
        setScore(0);
        setSelectedAnswer(null);
        setShowResult(false);
        setQuizComplete(false);
      };

      const getOptions = (correctWord) => {
        const otherWords = words.filter(w => w.german !== correctWord.german);
        const wrongOptions = otherWords.sort(() => Math.random() - 0.5).slice(0, 3).map(w => mode === 'de-to-en' ? w.english : w.german);
        const correctAnswer = mode === 'de-to-en' ? correctWord.english : correctWord.german;
        return [...wrongOptions, correctAnswer].sort(() => Math.random() - 0.5);
      };

      const handleAnswer = (answer) => {
        if (showResult) return;
        const correctAnswer = mode === 'de-to-en' ? quizWords[currentQuestion].english : quizWords[currentQuestion].german;
        const correct = answer === correctAnswer;
        setSelectedAnswer(answer);
        setShowResult(true);
        setIsCorrect(correct);
        if (correct) setScore(score + 1);
      };

      const nextQuestion = () => {
        if (currentQuestion < quizWords.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedAnswer(null);
          setShowResult(false);
        } else {
          setQuizComplete(true);
        }
      };

      const currentWord = quizWords[currentQuestion];
      const options = currentWord ? getOptions(currentWord) : [];

      if (quizComplete) {
        const percentage = Math.round((score / quizWords.length) * 100);
        return (
          <div className="quiz-container">
            <div className="quiz-complete">
              <div className="trophy-icon"><TrophyIcon /></div>
              <h2>Quiz Complete!</h2>
              <div className="final-score">
                <span className="score-number">{score}/{quizWords.length}</span>
                <span className="score-percent">{percentage}%</span>
              </div>
              <p className="score-message">
                {percentage === 100 ? "Perfect! You're a star!" : percentage >= 80 ? "Great job!" : percentage >= 60 ? "Good effort!" : "Keep practicing!"}
              </p>
              <button onClick={startNewQuiz} className="restart-btn"><RefreshCwIcon /><span>Try Again</span></button>
            </div>
          </div>
        );
      }

      if (!currentWord) return null;

      return (
        <div className="quiz-container">
          <div className="quiz-header">
            <div className="quiz-mode-selector">
              <button className={mode === 'de-to-en' ? 'active' : ''} onClick={() => setMode('de-to-en')}>German → English</button>
              <button className={mode === 'en-to-de' ? 'active' : ''} onClick={() => setMode('en-to-de')}>English → German</button>
            </div>
            <div className="quiz-stats">
              <div className="stat"><TargetIcon /><span>{currentQuestion + 1}/{quizWords.length}</span></div>
              <div className="stat"><TrophyIcon /><span>{score}</span></div>
            </div>
          </div>

          <div className="quiz-question">
            <span className="question-label">{mode === 'de-to-en' ? 'What does this mean?' : 'Translate this:'}</span>
            <h3 className="question-word">{mode === 'de-to-en' ? currentWord.german : currentWord.english}</h3>
            {mode === 'de-to-en' && currentWord.article && <span className="article-hint">({currentWord.article})</span>}
          </div>

          <div className="quiz-options">
            {options.map((option, index) => {
              let optionClass = 'option';
              if (showResult) {
                const correctAnswer = mode === 'de-to-en' ? currentWord.english : currentWord.german;
                if (option === correctAnswer) optionClass += ' correct';
                else if (option === selectedAnswer) optionClass += ' incorrect';
              } else if (option === selectedAnswer) optionClass += ' selected';
              return <button key={index} className={optionClass} onClick={() => handleAnswer(option)} disabled={showResult}>{option}</button>;
            })}
          </div>

          {showResult && (
            <div className={`result-feedback ${isCorrect ? 'correct' : 'incorrect'}`}>
              {isCorrect ? <span>Correct! Keep it up!</span> : <span>Not quite. The answer was: <strong>{mode === 'de-to-en' ? currentWord.english : currentWord.german}</strong></span>}
              <button onClick={nextQuestion} className="next-btn">{currentQuestion < quizWords.length - 1 ? 'Next Question' : 'See Results'}</button>
            </div>
          )}

          <button onClick={startNewQuiz} className="restart-btn-small"><RefreshCwIcon /><span>New Quiz</span></button>
        </div>
      );
    }

    // Main App
    function App() {
      const [activeTab, setActiveTab] = useState('flashcards');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      });

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(theme === 'dark' ? 'light' : 'dark');
      };

      const getWords = () => {
        if (selectedCategory === 'all') return vocabulary;
        const category = categories.find(c => c.id === selectedCategory);
        if (!category || category.words.length === 0) return vocabulary;
        return vocabulary.filter(word => category.words.includes(word.german));
      };

      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">🇩🇪</div>
              <h1>Deutsch Lernen</h1>
            </div>
            <p className="subtitle">Learn German with flashcards and quizzes</p>
          </header>

          <nav className="tabs">
            <button className={`tab ${activeTab === 'flashcards' ? 'active' : ''}`} onClick={() => setActiveTab('flashcards')}>
              <BookOpenIcon /><span>Flashcards</span>
            </button>
            <button className={`tab ${activeTab === 'quiz' ? 'active' : ''}`} onClick={() => setActiveTab('quiz')}>
              <BrainIcon /><span>Quiz</span>
            </button>
          </nav>

          <main>
            <div className="category-filter">
              <label>Choose a category:</label>
              <div className="category-buttons">
                {categories.map(category => (
                  <button key={category.id} className={`category-btn ${selectedCategory === category.id ? 'active' : ''}`} onClick={() => setSelectedCategory(category.id)}>
                    {category.name}
                  </button>
                ))}
              </div>
            </div>

            {activeTab === 'flashcards' ? <Flashcards words={getWords()} /> : <Quiz words={getWords()} />}
          </main>

          <footer className="footer">
            <p>© 2026 <a href="https://schnalz.net" target="_blank" rel="noopener noreferrer">Schnalz.net</a>. All rights reserved.</p>
            <button className="footer-toggle" onClick={toggleTheme}>
              {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
              <span>{theme === 'dark' ? 'Light' : 'Dark'}</span>
            </button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
