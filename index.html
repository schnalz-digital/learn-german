<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch Lernen - Learn German</title>
  <link rel="icon" href="favicon.svg">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #242424;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --success: #22c55e;
      --error: #ef4444;
      --border: #333333;
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header { text-align: center; margin-bottom: 32px; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: var(--text-secondary); font-size: 1rem; }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab:hover { background: var(--bg-card); color: var(--text-primary); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .category-filter { margin-bottom: 24px; }

    .category-filter label {
      display: block;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    .category-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

    .category-btn {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-btn:hover { background: var(--bg-card); color: var(--text-primary); }
    .category-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Flashcards */
    .flashcards-container {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid var(--border);
    }

    .flashcards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .flashcards-header h2 { font-size: 1.25rem; }

    .flashcards-progress { text-align: right; }
    .flashcards-progress span { font-size: 0.875rem; color: var(--text-secondary); }

    .progress-bar {
      width: 120px;
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .flashcard { perspective: 1000px; cursor: pointer; margin-bottom: 24px; }

    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 280px;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

    .flashcard-front, .flashcard-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
    }

    .flashcard-back { transform: rotateY(180deg); }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .flashcard-front h3, .flashcard-back h3 {
      font-size: 2.5rem;
      font-weight: 600;
      text-align: center;
    }

    .article-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent);
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .flip-hint {
      position: absolute;
      bottom: 16px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .german-reminder { font-size: 1rem; color: var(--text-secondary); margin-top: 12px; }

    .flashcards-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn svg { width: 24px; height: 24px; }

    .known-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .known-btn:hover { color: var(--text-primary); }
    .known-btn.active { background: var(--success); border-color: var(--success); color: white; }
    .known-btn svg { width: 20px; height: 20px; }

    .flashcards-actions { display: flex; justify-content: center; gap: 12px; }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover { background: var(--bg-card); color: var(--text-primary); }
    .action-btn svg { width: 18px; height: 18px; }

    .known-summary {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--success);
      font-size: 0.875rem;
    }

    /* Quiz */
    .quiz-container {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid var(--border);
    }

    .quiz-header { margin-bottom: 32px; }

    .quiz-mode-selector { display: flex; gap: 8px; margin-bottom: 16px; }

    .quiz-mode-selector button {
      flex: 1;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quiz-mode-selector button:hover { color: var(--text-primary); }
    .quiz-mode-selector button.active { background: var(--accent); border-color: var(--accent); color: white; }

    .quiz-stats { display: flex; gap: 16px; }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .stat.streak { color: #f59e0b; }
    .stat svg { width: 16px; height: 16px; }

    .quiz-question { text-align: center; margin-bottom: 32px; }

    .question-label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .question-word { font-size: 2.5rem; font-weight: 600; margin-bottom: 8px; }

    .article-hint { color: var(--accent); font-size: 1rem; }

    .quiz-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .option {
      padding: 16px 20px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-2px); }
    .option.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .option.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .option.incorrect { border-color: var(--error); background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .option:disabled { cursor: not-allowed; }

    .result-feedback {
      text-align: center;
      padding: 20px;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    .result-feedback.correct {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .result-feedback.incorrect {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--text-primary);
    }

    .result-feedback strong { color: var(--success); }

    .next-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .next-btn:hover { background: var(--accent-light); }

    .restart-btn-small {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 auto;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn-small:hover { background: var(--bg-card); color: var(--text-primary); }
    .restart-btn-small svg { width: 14px; height: 14px; }

    .quiz-complete { text-align: center; padding: 40px 20px; }

    .trophy-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 50%;
      margin-bottom: 24px;
      font-size: 40px;
    }

    .quiz-complete h2 { font-size: 2rem; margin-bottom: 24px; }

    .final-score { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 24px; }

    .score-number { font-size: 3rem; font-weight: 700; color: var(--accent); }
    .score-percent { font-size: 1.25rem; color: var(--text-secondary); }
    .score-message { font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 32px; }

    .restart-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--accent);
      border: none;
      border-radius: 24px;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn:hover { background: var(--accent-light); transform: translateY(-2px); }
    .restart-btn svg { width: 18px; height: 18px; }

    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    @media (max-width: 600px) {
      .app { padding: 16px; }
      .logo h1 { font-size: 1.5rem; }
      .flashcards-container, .quiz-container { padding: 20px; }
      .flashcard-inner { height: 220px; }
      .flashcard-front h3, .flashcard-back h3, .question-word { font-size: 1.75rem; }
      .quiz-options { grid-template-columns: 1fr; }
      .category-buttons { justify-content: center; }
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icons as SVG components
    const BookOpenIcon = () => (

    const RefreshCwIcon = () => (

        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>

    const TargetIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    );

    const TrophyIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>

    const ShuffleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/>
      </svg>
    );

    // Vocabulary data
    const vocabulary = [
      { german: "Hallo", english: "Hello", article: null },
      { german: "Tschüss", english: "Goodbye", article: null },
      { german: "Ja", english: "Yes", article: null },
      { german: "Nein", english: "No", article: null },

      { german: "Danke", english: "Thank you", article: null },

      { german: "Wasser", english: "Water", article: "das" },

      { german: "Tag", english: "Day", article: "der" },
      { german: "Nacht", english: "Night", article: "die" },
      { german: "Morgen", english: "Morning", article: "der" },
      { german: "Abend", english: "Evening", article: "der" },
      { german: "Ich bin", english: "I am", article: null },
      { german: "Du bist", english: "You are", article: null },
      { german: "Er ist", english: "He is", article: null },
      { german: "Sie ist", english: "She is", article: null },
      { german: "Wir sind", english: "We are", article: null },
      { german: "Sie sind", english: "They are", article: null },
      { german: "Groß", english: "Big / Tall", article: null },
      { german: "Klein", english: "Small / Little", article: null },
      { german: "Gut", english: "Good", article: null },
      { german: "Schlecht", english: "Bad", article: null },
      { german: "Neu", english: "New", article: null },
      { german: "Alt", english: "Old", article: null },
    ];

    const categories = [
      { id: "all", name: "All Words" },
      { id: "greetings", name: "Greetings", words: ["Hallo", "Tschüss"] },
      { id: "basics", name: "Basics", words: ["Ja", "Nein", "Bitte", "Danke", "Entschuldigung"] },
      { id: "food", name: "Food & Drinks", words: ["Wasser", "Brot", "Milch", "Apfel", "Kaffee", "Tee"] },
      { id: "nouns", name: "Nouns", words: ["Haus", "Katze", "Hund", "Buch", "Schule", "Freund", "Freundin", "Mann", "Frau", "Kind", "Auto", "Tag", "Nacht", "Morgen", "Abend"] },
    ];

    // Flashcards Component
    function Flashcards({ words }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [knownWords, setKnownWords] = useState(new Set());
      const [shuffledWords, setShuffledWords] = useState([]);

      useEffect(() => {
        setShuffledWords([...words]);
        setCurrentIndex(0);
        setIsFlipped(false);
      }, [words]);

      const shuffleWords = () => {
        const shuffled = [...shuffledWords].sort(() => Math.random() - 0.5);
        setShuffledWords(shuffled);
        setCurrentIndex(0);
        setIsFlipped(false);
      };

      const resetDeck = () => {
        setShuffledWords([...words]);
        setCurrentIndex(0);
        setIsFlipped(false);
        setKnownWords(new Set());
      };

      const nextCard = () => {
        if (currentIndex < shuffledWords.length - 1) {
          setCurrentIndex(currentIndex + 1);
          setIsFlipped(false);
        }
      };

      const prevCard = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          setIsFlipped(false);
        }
      };

      const toggleKnown = () => {
        const word = shuffledWords[currentIndex];
        const newKnown = new Set(knownWords);
        if (newKnown.has(word.german)) {
          newKnown.delete(word.german);
        } else {
          newKnown.add(word.german);
        }
        setKnownWords(newKnown);
      };

      const currentWord = shuffledWords[currentIndex];

      if (!currentWord) return null;

      return (
        <div className="flashcards-container">
          <div className="flashcards-header">
            <h2>Flashcards</h2>
            <div className="flashcards-progress">
              <span>{currentIndex + 1} / {shuffledWords.length}</span>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${((currentIndex + 1) / shuffledWords.length) * 100}%` }} />
              </div>
            </div>
          </div>

          <div className={`flashcard ${isFlipped ? 'flipped' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
            <div className="flashcard-inner">
              <div className="flashcard-front">
                <span className="card-label">German</span>
                {currentWord.article && <span className="article-badge">{currentWord.article}</span>}
                <h3>{currentWord.german}</h3>
                <p className="flip-hint">Click to flip</p>
              </div>
              <div className="flashcard-back">
                <span className="card-label">English</span>
                <h3>{currentWord.english}</h3>
                <p className="german-reminder">{currentWord.german}</p>
              </div>
            </div>
          </div>

          <div className="flashcards-controls">
            <button onClick={prevCard} disabled={currentIndex === 0} className="nav-btn"><ChevronLeftIcon /></button>
            <button onClick={toggleKnown} className={`known-btn ${knownWords.has(currentWord.german) ? 'active' : ''}`}>
              <CheckIcon /><span>{knownWords.has(currentWord.german) ? 'Known' : 'Mark Known'}</span>
            </button>
            <button onClick={nextCard} disabled={currentIndex === shuffledWords.length - 1} className="nav-btn"><ChevronRightIcon /></button>
          </div>

          <div className="flashcards-actions">
            <button onClick={shuffleWords} className="action-btn"><ShuffleIcon /><span>Shuffle</span></button>
            <button onClick={resetDeck} className="action-btn"><RotateCcwIcon /><span>Reset</span></button>
          </div>

          {knownWords.size > 0 && (
            <div className="known-summary"><span>{knownWords.size} of {shuffledWords.length} words known</span></div>
          )}
        </div>
      );
    }

    // Quiz Component
    function Quiz({ words }) {
      const [quizWords, setQuizWords] = useState([]);
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [isCorrect, setIsCorrect] = useState(false);
      const [quizComplete, setQuizComplete] = useState(false);
      const [mode, setMode] = useState('de-to-en');

      useEffect(() => { startNewQuiz(); }, [words, mode]);

      const startNewQuiz = () => {
        const shuffled = [...words].sort(() => Math.random() - 0.5).slice(0, 10);
        setQuizWords(shuffled);
        setCurrentQuestion(0);
        setScore(0);
        setSelectedAnswer(null);
        setShowResult(false);
        setQuizComplete(false);
      };

      const getOptions = (correctWord) => {
        const otherWords = words.filter(w => w.german !== correctWord.german);
        const wrongOptions = otherWords.sort(() => Math.random() - 0.5).slice(0, 3).map(w => mode === 'de-to-en' ? w.english : w.german);
        const correctAnswer = mode === 'de-to-en' ? correctWord.english : correctWord.german;
        return [...wrongOptions, correctAnswer].sort(() => Math.random() - 0.5);
      };

      const handleAnswer = (answer) => {
        if (showResult) return;
        const correctAnswer = mode === 'de-to-en' ? quizWords[currentQuestion].english : quizWords[currentQuestion].german;
        const correct = answer === correctAnswer;
        setSelectedAnswer(answer);
        setShowResult(true);
        setIsCorrect(correct);
        if (correct) setScore(score + 1);
      };

      const nextQuestion = () => {
        if (currentQuestion < quizWords.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedAnswer(null);
          setShowResult(false);
        } else {
          setQuizComplete(true);
        }
      };

      const currentWord = quizWords[currentQuestion];
      const options = currentWord ? getOptions(currentWord) : [];

      if (quizComplete) {
        const percentage = Math.round((score / quizWords.length) * 100);
        return (
          <div className="quiz-container">
            <div className="quiz-complete">
              <div className="trophy-icon"><TrophyIcon /></div>
              <h2>Quiz Complete!</h2>
              <div className="final-score">
                <span className="score-number">{score}/{quizWords.length}</span>
                <span className="score-percent">{percentage}%</span>
              </div>
              <p className="score-message">
                {percentage === 100 ? "Perfect! You're a star!" : percentage >= 80 ? "Great job!" : percentage >= 60 ? "Good effort!" : "Keep practicing!"}
              </p>
              <button onClick={startNewQuiz} className="restart-btn"><RefreshCwIcon /><span>Try Again</span></button>
            </div>
          </div>
        );
      }

      if (!currentWord) return null;

      return (
        <div className="quiz-container">
          <div className="quiz-header">
            <div className="quiz-mode-selector">
              <button className={mode === 'de-to-en' ? 'active' : ''} onClick={() => setMode('de-to-en')}>German → English</button>
              <button className={mode === 'en-to-de' ? 'active' : ''} onClick={() => setMode('en-to-de')}>English → German</button>
            </div>
            <div className="quiz-stats">
              <div className="stat"><TargetIcon /><span>{currentQuestion + 1}/{quizWords.length}</span></div>
              <div className="stat"><TrophyIcon /><span>{score}</span></div>
            </div>
          </div>

          <div className="quiz-question">
            <span className="question-label">{mode === 'de-to-en' ? 'What does this mean?' : 'Translate this:'}</span>
            <h3 className="question-word">{mode === 'de-to-en' ? currentWord.german : currentWord.english}</h3>
            {mode === 'de-to-en' && currentWord.article && <span className="article-hint">({currentWord.article})</span>}
          </div>

          <div className="quiz-options">
            {options.map((option, index) => {
              let optionClass = 'option';
              if (showResult) {
                const correctAnswer = mode === 'de-to-en' ? currentWord.english : currentWord.german;
                if (option === correctAnswer) optionClass += ' correct';
                else if (option === selectedAnswer) optionClass += ' incorrect';
              } else if (option === selectedAnswer) optionClass += ' selected';
              return <button key={index} className={optionClass} onClick={() => handleAnswer(option)} disabled={showResult}>{option}</button>;
            })}
          </div>

          {showResult && (
            <div className={`result-feedback ${isCorrect ? 'correct' : 'incorrect'}`}>
              {isCorrect ? <span>Correct! Keep it up!</span> : <span>Not quite. The answer was: <strong>{mode === 'de-to-en' ? currentWord.english : currentWord.german}</strong></span>}
              <button onClick={nextQuestion} className="next-btn">{currentQuestion < quizWords.length - 1 ? 'Next Question' : 'See Results'}</button>
            </div>
          )}

          <button onClick={startNewQuiz} className="restart-btn-small"><RefreshCwIcon /><span>New Quiz</span></button>
        </div>
      );
    }

    // Main App
    function App() {
      const [activeTab, setActiveTab] = useState('flashcards');
      const [selectedCategory, setSelectedCategory] = useState('all');

      const getWords = () => {
        if (selectedCategory === 'all') return vocabulary;
        const category = categories.find(c => c.id === selectedCategory);
        if (!category || category.words.length === 0) return vocabulary;
        return vocabulary.filter(word => category.words.includes(word.german));
      };

      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">🇩🇪</div>
              <h1>Deutsch Lernen</h1>
            </div>
            <p className="subtitle">Learn German with flashcards and quizzes</p>
          </header>

          <nav className="tabs">
            <button className={`tab ${activeTab === 'flashcards' ? 'active' : ''}`} onClick={() => setActiveTab('flashcards')}>
              <BookOpenIcon /><span>Flashcards</span>
            </button>
            <button className={`tab ${activeTab === 'quiz' ? 'active' : ''}`} onClick={() => setActiveTab('quiz')}>
              <BrainIcon /><span>Quiz</span>
            </button>
          </nav>

          <main>
            <div className="category-filter">
              <label>Choose a category:</label>
              <div className="category-buttons">
                {categories.map(category => (
                  <button key={category.id} className={`category-btn ${selectedCategory === category.id ? 'active' : ''}`} onClick={() => setSelectedCategory(category.id)}>
                    {category.name}
                  </button>
                ))}
              </div>
            </div>

            {activeTab === 'flashcards' ? <Flashcards words={getWords()} /> : <Quiz words={getWords()} />}
          </main>

          <footer className="footer"><p>© 2026 <a href="https://schnalz.net" target="_blank" rel="noopener noreferrer" style={{color: 'inherit', textDecoration: 'underline'}}>Schnalz.net</a>. All rights reserved.</p></footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
